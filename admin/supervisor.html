<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="../tailwindcss.min.js"></script>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div id="main-container" class="flex items-center justify-between ">
        <div class="w-[25%] mx-auto bg-blue-900 h-[100vh] pt-10">
            <ul class="w-[90%] mx-auto">
                <a href="dashbaord.html">
                    <li class="uppercase  p-2 mb-5 dash-list">
                        <div class="flex items-center gap-5">
                            <img src="../images/layout.png" alt="" class="w-5 h-5">
                            <p class="text-white text-sm font-bold">Dashbaord</p>
                        </div>
                    </li>
                </a>
                <a href="hostel.html">
                    <li class="uppercase mb-5 p-2 dash-list">
                        <div class="flex items-center gap-5 ">
                            <img src="../images/hotel.png" alt="" class="w-5 h-5">
                            <p class="text-white text-sm font-bold">Hostels</p>
                        </div>
                    </li>
                </a>
                <a href="rooms.html">
                    <li class="uppercase dash-list mb-5  p-2">
                        <div class="flex items-center gap-5 ">
                            <img src="../images/door.png" alt="" class="w-5 h-5">
                            <p class="text-white text-sm font-bold">room</p>
                        </div>
                    </li>
                </a>
                <a href="student.html">
                    <li class="uppercase  mb-5 p-2 dash-list">
                        <div class="flex items-center gap-5">
                            <img src="../images/user.png" alt="" class="w-5 h-5">
                            <p class="text-white text-sm font-bold">Students</p>
                        </div>
                    </li>
                </a>
                <a href="supervisor.html">
                    <li class="uppercase  mb-5 p-2 bg-white  rounded-[5px]">
                        <div class="flex items-center gap-5">
                            <img src="../images/user (2).png" alt="" class="h-5 w-5">
                            <p class="text-blue-900 text-sm font-bold">Supervisors</p>
                        </div>
                    </li>
                </a>
                <a href="transaction.html">
                    <li class="uppercase  mb-50 p-2 dash-list">
                        <div class="flex items-center gap-5">
                            <img src="../images/dollars.png" alt="" class="w-5 h-5">
                            <p class="text-white text-sm font-bold">Transaction</p>
                        </div>
                    </li>
                </a>
                <li class="uppercase mb-5 p-2 bg-red-700 hover:bg-red-600 rounded-[10px]">
                    <p class="text-white text-sm font-bold text-center ">logout</p>
                </li>
            </ul>
        </div>
        <div class="w-[75%] mx-auto h-[100vh] pt-5 ">
            <div class="w-[95%] mx-auto">
                <div class="w-[95%] mx-auto mb-5">
                    <h1 class="uppercase text-blue-900 font-bold text-xl mb-3">dashboard</h1>
                    <p class="w-full bg-blue-100 p-2 rounded-[5px] text-lg text-blue-900 font-bold">Supervisor</p>
                </div>

                <div
                    class="border-2 border-solid border-blue-800  text-blue-800 ps-5  rounded-[5px] my-4 w-[95%] mx-auto mb-5">
                    <input type="search" id="supervisor-search" placeholder="search supervisor..."
                        class="w-full outline-none placeholder:text-blue-800 placeholder:text-xl h-9">
                </div>

                <div class="w-[95%] mx-auto">
                    <table id="table-container" class="w-full">
                        <thead>
                            <tr class="border-b-1 border-b-solid border-b-blue-800  text-center uppercase font-bold text-blue-800">
                                <th class="py-1">s/n</th>
                                <th class="py-1">Id</th>
                                <th class="py-1">Name</th>
                                <th class="py-1">hostel</td>
                                <th class="py-1"></th>
                            </tr>
                        </thead>
                        <tbody id="table-body">

                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- more -->
    <div id="info-container" class="student-more-container pt-30 hide">
        <img id="cancel-btn" src="../images/cross.png" alt="" class="w-9 h-9 cancel">
        <div class="student-more bg-white shadow-lg rounded-[10px] w-[80%] mx-auto py-20 px-5 relative">
            <div id="stud-container">
                <!-- <h1 class="text-lg uppercase text-blue-800 font-bold">Guardian</h1> -->
                <div class="flex gap-1 items-center mb-3">
                    <h1 class="text-blue-800 uppercase font-bold text-lg">FirstName:</h1>
                    <p id="sup-firstname" class="text-blue-700 font-light uppercase text-sm"></p>
                </div>
                <div class="flex gap-1 items-center mb-3">
                    <h1 class="text-blue-800 uppercase font-bold text-lg">lastname:</h1>
                    <p id="sup-lastname" class="text-blue-700 font-light uppercase text-sm"></p>
                </div>
                <div class="flex gap-1 items-center mb-3">
                    <h1 class="text-blue-800 uppercase font-bold text-lg">id:</h1>
                    <p id="sup-id" class="text-blue-600  font-bold  text-sm"></p>
                </div>
                <div class="flex gap-1 items-center mb-3">
                    <h1 class="text-blue-800 uppercase font-bold text-lg">Email:</h1>
                    <p id="sup-email" class="text-blue-700 font-medium text-sm"></p>
                </div>
                <div class="flex gap-1 items-center mb-3">
                    <h1 class="text-blue-800 uppercase font-bold text-lg">Gender:</h1>
                    <p id="sup-gender" class="text-blue-900 font-bold text-sm"></p>
                </div>
                <div class="flex gap-1 items-center mb-3">
                    <h1 class="text-blue-800 uppercase font-bold text-lg">Phone:</h1>
                    <p id="sup-phone" class="text-blue-700 font-medium text-sm"></p>
                </div>
            </div>
            <div id="sup-image" class="w-60 h-80 info-image">
                <img src="../images/hotel-building-ho-chi-minh-vietnam.jpg" alt=""
                    class="w-full h-full object-center object-cover rounded-[10px] border-2 border-solid border-blue-900">
            </div>
        </div>
    </div>

    <!-- caution -->
    <div id="caution-container" class="caution hide smooth overflow-hidden truncate">
        <div class="w-[40%] mx-auto shadow-lg bg-white p-5 rounded-[10px]">
            <p class="text-blue-800 font-bold">Are you sure you want delete <span id="caution-supervisor-id"
                    class="text-blue-500 font-bold"></span>-<span id="caution-supervisor-name"
                    class="font-medium"></span>?</p>
            <div class="flex justify-between items-center gap-5 w-full mt-5">
                <button id="caution-function-cancel"
                    class="bg-blue-500 p-3 rounded-[10px] w-[50%] mx-auto text-white hover:bg-blue-600">Cancel</button>
                <button id="final-delete"
                    class="bg-red-500 p-3 rounded-[10px] w-[50%] mx-auto text-white hover:bg-red-600">Delete</button>
            </div>
        </div>
    </div>

    <!-- successfull -->
    <div id="successful-message" class="successful py-5 w-[27%] mx-auto bg-white rounded-[50px] shadow-xl hide">
        <p id="successful-text" class=" text-lg font-bold text-center"></p>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase.js"></script>
<script src="supervisor.js"></script>

</html>
