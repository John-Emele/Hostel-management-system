<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="../tailwindcss.min.js"></script>
    <link rel="stylesheet" href="../style.css">
</head>

<body class="relative">
    <div class="max-w-7xl mx-auto">
        <!-- side menu -->
    <div id="side-menu" class="hide w-[70%]  bg-blue-600 rounded-e-[20px] lg:px-3 md:px-0  h-[100vh] side-menu z-1000">
        <ul class="w mx-auto  py-10 ">
            <a href="profile.html" class="">
                <div class="flex gap-3 items-center mb-6 px-3 hover:bg-blue-400  hover:py-1 hover:ps-3">
                    <img src="../images/user.png" alt="" class="w-6 h-6">
                    <p class=" text-white font-bold text-sm uppercase mt-1">profile</p>
                </div>
            </a>
            <a href="Account.html" class="">
                <div class="flex gap-3 items-center mb-6 px-3 hover:bg-blue-400   hover:py-1 hover:ps-3 ">
                    <img src="../images/info.png" alt="" class="w-7 h-7">
                    <p class=" text-white font-bold text-sm uppercase mt-1">info</p>
                </div>
            </a>
            <a href="room.html" class="">
                <div
                    class="flex gap-3 items-center mb-6 px-3 hover:bg-blue-400  hover:text-center hover:py-1 hover:ps-3">
                    <img src="../images/bed.png" alt="" class="w-7 h-7">
                    <p class="text-white font-bold text-sm uppercase mt-1">room</p>
                </div>
            </a>
            <a href="book.html">
                <div
                    class="flex gap-3 items-center mb-6 px-3 bg-blue-400  text-center py-1 ps-3">
                    <img src="../images/booking.png" alt="" class="w-7 h-7">
                    <p class="text-white font-bold text-sm uppercase">book</p>
                </div>
            </a>
            <a href="pay.html">
                <div
                    class="flex gap-3 items-center mb-6 px-3 hover:bg-blue-400  hover:text-center hover:py-1 hover:ps-3">
                    <img src="../images/dollars.png" alt="" class="w-7 h-7">
                    <p class="text-white font-bold text-sm uppercase">top up</p>
                </div>
            </a>
        </ul>
    </div>
    <div class="flex justify-between align-center">
        <div class="md:w-[8%] lg:w-[15%]  mx-auto hidden md:block">
            <div class="w-full bg-blue-600 rounded-e-[20px] lg:px-3 md:px-0 ">
                <ul class="w mx-auto mt-25 py-10 ">
                    <a href="profile.html" class="">
                        <div
                            class="flex gap-4 mb-6 px-3 hover:bg-blue-400 lg:hover:rounded-[20px] md:hover:text-center hover:py-1 hover:ps-3">
                            <img src="../images/user.png" alt="" class="w-7 h-7">
                            <p class="md:hidden lg:block text-white font-bold text-sm uppercase mt-1">profile</p>
                        </div>
                    </a>
                    <a href="Account.html" class="">
                        <div
                            class="flex gap-4 mb-6 px-3 hover:bg-blue-400 lg:hover:rounded-[20px] md:hover:text-center hover:py-1 hover:ps-3">
                            <img src="../images/info.png" alt="" class="w-7 h-7">
                            <p class="md:hidden lg:block text-white font-bold text-sm uppercase mt-1">info</p>
                        </div>
                    </a>
                    <a href="room.html" class="">
                        <div
                            class="flex gap-4 mb-6 px-3 hover:bg-blue-400 lg:hover:rounded-[20px] md:hover:text-center hover:py-1 hover:ps-3">
                            <img src="../images/bed.png" alt="" class="w-7 h-7">
                            <p class="md:hidden lg:block text-white font-bold text-sm uppercase mt-1">room</p>
                        </div>
                    </a>
                    <a href="book.html">
                        <div class="flex gap-4 mb-6 px-3 bg-blue-400 lg:rounded-[20px] md:text-center py-1 ps-3">
                            <img src="../images/booking.png" alt="" class="w-7 h-7">
                            <p class="md:hidden lg:block text-white font-bold text-sm uppercase">book</p>
                        </div>
                    </a>
                    <a href="pay.html">
                        <div
                            class="flex gap-4 mb-6 px-3 hover:bg-blue-400 lg:hover:rounded-[20px] md:hover:text-center hover:py-1 hover:ps-3">
                            <img src="../images/dollars.png" alt="" class="w-7 h-7">
                            <p class="md:hidden lg:block text-white font-bold text-sm uppercase">top up</p>
                        </div>
                    </a>
                </ul>
            </div>
            <!-- <div class=""></div> -->
        </div>
        <div id="hostel-container"
            class="md:w-[92%] lg:w-[85%] w-full mx-auto md:pt-5  lg:h-200 md:h-160 truncate overflow-auto hostel-display ">
            <div class="top-menu-hostel flex justify-between w-full mx-auto z-100 h-20 pt-5 md:hidden">
                <h1 class="text-blue-800 text-xl font-bold  mx-auto text-center ">Hostels</h1>
                <img id="side-menu-btn" src="../images/widget.png" alt="" class="md:hidden w-8 h-8 me-3">
            </div>
               <div id="select-level" class="infoForm md:w-[60%] w-[90%] mx-auto mt-40 bg-white rounded-[10px]  p-15 shadow-blue-200 shadow-lg">
                        <form action="">
                            <div class="edit-group mb-5">
                                <select name="" id="student-level"
                                    class="outline-none ps-2 text-blue-900  w-full mx-auto border-2 border-solid border-blue-800 h-10 rounded-[10px]"
                                    required>
                                    <option value=""></option>
                                    <option value="100">100</option>
                                    <option value="200">200</option>
                                    <option value="300">300</option>
                                    <option value="400">400</option>
                                    <option value="500">600</option>
                                </select>
                                <label class="text-blue-800 edit-label">level</label>
                                <p id="student-level-error" class="error text-light text-xs text-red-400 ms-3"></p>
                            </div>
                            <div  class="w-[60%] mx-auto h-10">
                                <button id="level-submit-btn" type="button" class="rounded-[10px] w-full h-full bg-blue-800 hover:bg-blue-600 text-white font-bold text-lg cursor-pointer">Submit</button>
                            </div>
                        </form>
                    </div>
            <div id="hostel-header" class="hide w-[95%] mx-auto hidden md:block">
                <h1 class="text-blue-800 text-2xl font-bold uppercase">hostels</h1>
            </div>
            <div id="hostel-body"
                class="hide w-[90%] md:w-[95%] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 md:pt-10 ">
                
            </div>

            <div id="hostel-detail" class="hostel-details pt-[130px] hide z-100">
                <img id="cancel" class="cancel w-9 h-9" src="../images/cross.png" alt="">
                <h1 id="hostel-name" class="text-white uppercase text-xl text-center mb-10 font-bold"></h1>
                <div class="w-[80%] mx-auto shadow-lg bg-white rounded-[10px] p-5">
                    <table id="table-container" class="w-full h-50">
                        <thead>
                            <tr class="border-b border-b-solid border-b-blue-600">
                                <td class="uppercase text-blue-500 uppercase text-sm text-center">room type</td>
                                <td class="uppercase text-blue-500 uppercase text-sm text-center">bed spaces</td>
                                <td class="uppercase text-blue-500 uppercase text-sm text-center">price</td>
                                <td class="uppercase text-blue-500 uppercase text-sm text-center">status</td>
                                <td></td>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="">
                            <tr class="border-b border-b-solid border-b-blue-600">
                                <td class="uppercase text-blue-500 uppercase text-xs font-bold text-center">3 beds</td>
                                <td class="uppercase text-blue-500 uppercase text-xs font-bold text-center">6</td>
                                <td class="uppercase text-green-500 uppercase text-sm font-bold text-center">₦750,000
                                </td>
                                <td class="uppercase text-green-500 uppercase text-sm font-light text-center">available
                                </td>
                                <td class="p-2 text-center"><button
                                        class="bg-blue-600 font-bold text-white p-3 w-20 rounded-[10px] uppercase text-xs hover:bg-blue-500">book</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
     <!-- successfull -->
    <div id="successful-message" class="successful py-5 w-[27%] mx-auto bg-white rounded-[50px] shadow-xl hide">
        <p id="successful-text" class=" text-lg font-bold text-center"></p>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase.js"></script>
<script src="book.js"></script>
</html>
