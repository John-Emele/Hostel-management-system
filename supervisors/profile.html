<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="../tailwindcss.min.js"></script>
  <title>Supervisor Dashboard</title>
</head>
<body class="bg-gray-100">

  <div class="flex h-screen">

    <!-- Sidebar -->
    <div class="w-64 bg-blue-900 text-white flex flex-col">
      <div class="p-6 text-2xl font-bold border-b border-blue-700">
        Supervisor
      </div>

      <nav class="flex-1 p-4 space-y-3">
        <a href="#" class="block p-3 rounded-lg bg-blue-700">Dashboard</a>
        <a href="room.html" class="block p-3 rounded-lg hover:bg-blue-700">Students</a>
        <a href="theme.html" class="block p-3 rounded-lg hover:bg-blue-700">Rooms</a>
        <a href="request.html" class="block p-3 rounded-lg hover:bg-blue-700">Requests</a>
      </nav>

      <div class="p-4 border-t border-blue-700">
        <button class="w-full bg-red-500 hover:bg-red-600 p-2 rounded-lg">
          Logout
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-6 overflow-y-auto">

      <!-- Header -->
      <h1 class="text-2xl font-bold mb-6">Welcome, Supervisor 👋</h1>

      <!-- Stats -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
        <div class="bg-white p-5 rounded-xl shadow">
          <p class="text-gray-500">Total Students</p>
          <h2 class="text-2xl font-bold">120</h2>
        </div>

        <div class="bg-white p-5 rounded-xl shadow">
          <p class="text-gray-500">Total Rooms</p>
          <h2 class="text-2xl font-bold">80</h2>
        </div>

        <div class="bg-white p-5 rounded-xl shadow">
          <p class="text-gray-500">Available Rooms</p>
          <h2 class="text-2xl font-bold">15</h2>
        </div>
      </div>

      <!-- Students Table -->
      <div class="bg-white p-6 rounded-xl shadow mb-6">
        <h2 class="text-xl font-semibold mb-4">Students</h2>

        <table class="w-full text-left">
          <thead>
            <tr class="border-b">
              <th class="py-2">Student ID</th>
              <th>Name</th>
              <th>Room</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr class="border-b">
              <td class="py-2">CKC001</td>
              <td>John Doe</td>
              <td>A12</td>
              <td>
                <button class="bg-blue-500 text-white px-3 py-1 rounded">
                  Assign
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Requests -->
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-semibold mb-4">Requests</h2>

        <table class="w-full text-left">
          <thead>
            <tr class="border-b">
              <th class="py-2">Student ID</th>
              <th>Request</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr class="border-b">
              <td class="py-2">CKC002</td>
              <td>Room Change</td>
              <td class="space-x-2">
                <button class="bg-green-500 text-white px-3 py-1 rounded">
                  Approve
                </button>
                <button class="bg-red-500 text-white px-3 py-1 rounded">
                  Deny
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>

  </div>

</body>
</html>
